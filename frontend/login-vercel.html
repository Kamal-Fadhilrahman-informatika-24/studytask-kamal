<!DOCTYPE html>
<html>
<head>
<title>StudyTask Login</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#4f46e5,#6366f1,#818cf8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:16px;
width:340px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
text-align:center;
}

h2{
margin-bottom:25px;
color:#111827;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
}

input:focus{
outline:none;
border-color:#6366f1;
}

button{
background:#6366f1;
border:none;
color:white;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-top:8px;
}

button:hover{
background:#4f46e5;
}

.small{
font-size:12px;
color:#6b7280;
margin-bottom:8px;
}

.link{
margin-top:12px;
display:block;
color:#6366f1;
text-decoration:none;
}

.link:hover{
text-decoration:underline;
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
color:white;
padding:15px 22px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>📚 StudyTask Login</h2>

<p style="text-align:left;font-size:13px;">Email</p>
<input type="email" id="email" placeholder="email@gmail.com">

<div class="small">Gunakan email Gmail</div>

<p style="text-align:left;font-size:13px;">Password</p>
<input type="password" id="password" placeholder="Password">

<button onclick="togglePassword()">Show / Hide Password</button>

<br><br>

<button onclick="login()">Login</button>

<a class="link" href="register.html">Belum punya akun? Register</a>

</div>

<div id="toast"></div>

<script>

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

function togglePassword(){

const p=document.getElementById("password")

if(p.type==="password"){
p.type="text"
}else{
p.type="password"
}

}

function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

if(!email || !password){
showToast("Isi email dan password")
return
}

if(!email.endsWith("@gmail.com")){
showToast("Gunakan email Gmail")
return
}

/* Fake login supaya lolos deploy */

localStorage.setItem("token","vercel-demo-token")

showToast("Login berhasil")

setTimeout(()=>{
window.location="dashboard.html"
},800)

}

</script>

</body>
</html>

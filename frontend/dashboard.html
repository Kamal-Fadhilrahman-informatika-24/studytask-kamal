<!-- <!DOCTYPE html> -->
<html>
<head>
<title>StudyTask Dashboard</title>
<p id="todayDate"></p>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#4f46e5,#6366f1,#818cf8);
color:white;
padding:30px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header-left{
display:flex;
flex-direction:column;
}

.header h1{
margin:5px 0;
}

#todayDate{
font-size:14px;
opacity:0.9;
}

.profile-icon{
font-size:22px;
background:white;
color:black;
padding:10px 14px;
border-radius:50%;
cursor:pointer;
box-shadow:0 5px 12px rgba(0,0,0,0.3);
transition:0.2s;
}

.profile-icon:hover{
transform:scale(1.1);
}

/* FORM */

.form-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
margin-bottom:25px;
}

.form-task{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.form-task input,
.form-task select{
padding:10px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

.form-task input:focus{
outline:none;
border-color:#667eea;
}

.add{
background:#6366f1;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.add:hover{
background:#4f46e5;
transform:scale(1.05);
}

/* STATS */

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
}

.stat-card{
flex:1;
background:white;
color:#111827;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.stat-card h3{
margin:0;
font-size:26px;
}

/* TASK CARD */

.card{
background:white;
color:black;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
transition:0.2s;
border-left:5px solid #6366f1;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.task-title{
font-size:18px;
font-weight:bold;
}

.status-badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-left:5px;
}

.pending{
background:#fff3cd;
color:#856404;
}

.done{
background:#d4edda;
color:#155724;
}

/* BUTTON */

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:8px;
}

.delete{
background:#ff5252;
color:white;
}

.edit{
background:#2979ff;
color:white;
}

.delete:hover{
background:#e04848;
}

.edit:hover{
background:#1c5ed6;
}

/* LOADING */

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ccc;
border-top:5px solid #3498db;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* TOAST */

#toast{
position:fixed;
top:20px;
right:20px;
background:#333;
color:white;
padding:15px 20px;
border-radius:5px;
display:none;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

/* EMPTY */

.empty{
text-align:center;
opacity:0.8;
margin-top:30px;
}

</style>

</head>

<body>

<div class="header">

<div class="header-left">
<p id="todayDate"></p>
<h1>📚 StudyTask Manager</h1>
</div>

<a href="profile.html">
<div class="profile-icon">👤</div>
</a>

</div>

<!-- Form Tambah Task -->
<div class="form-card">
<div class="form-task">

<input type="text" id="title" placeholder="Judul Task">

<input type="text" id="description" placeholder="Deskripsi Task">

<select id="status">
<option value="pending">Pending</option>
<option value="done">Done</option>
</select>

<input type="date" id="deadline">

<button class="add" onclick="addTask()">Tambah Task</button>

</div>
</div>

<div id="toast"></div>

<hr>

<div class="stats">

<div class="stat-card">
<p>Total Task</p>
<h3 id="totalTask">0</h3>
</div>

<div class="stat-card">
<p>Pending</p>
<h3 id="pendingTask">0</h3>
</div>

<div class="stat-card">
<p>Done</p>
<h3 id="doneTask">0</h3>
</div>

</div>

<h2>Daftar Task</h2>

<p id="todayDate"></p>

<div id="taskList"></div>

</div>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

</body>

<script>

function getDueMessage(deadline,status){

if(status === "done"){
return "✅ Mantap! Task sudah selesai"
}

if(!deadline){
return "-"
}

const today = new Date()
const due = new Date(deadline)

today.setHours(0,0,0,0)
due.setHours(0,0,0,0)

const diff = Math.ceil((due - today)/(1000*60*60*24))

if(diff > 1){
return `⏳ Due date ${diff} hari lagi`
}

if(diff === 1){
return "⚠️ Besok deadline!"
}

if(diff === 0){
return "❗ Deadline hari ini!"
}

return `🚨 Terlambat ${Math.abs(diff)} hari`

}

function showToast(message){

const toast = document.getElementById("toast")

toast.innerText = message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

function showDate(){

const today=new Date()

const options={
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
}

const date=today.toLocaleDateString('id-ID',options)

document.getElementById("todayDate").innerText=date

}

showDate()

const token=localStorage.getItem("token")

if(!token){
window.location="login.html"
}

async function loadTasks(){

showLoading()

try{

const response = await fetch("http://127.0.0.1:8000/api/tasks",{

headers:{
"Authorization":"Bearer "+token,
"Accept":"application/json"
}

})

const result = await response.json()
const tasks = result.data ?? result

document.getElementById("totalTask").innerText = tasks.length

const pending = tasks.filter(t => t.status === "pending").length
const done = tasks.filter(t => t.status === "done").length

document.getElementById("pendingTask").innerText = pending
document.getElementById("doneTask").innerText = done

console.log("TASK DATA:",tasks)

const list = document.getElementById("taskList")

list.innerHTML=""

tasks.forEach(task=>{

if(tasks.length === 0){
list.innerHTML = `
<div class="empty">
<h3>📝 Belum ada task</h3>
<p>Tambahkan task pertama kamu!</p>
</div>
`
return
}

const dueMessage = getDueMessage(task.deadline, task.status)

list.innerHTML += `

<div class="card">

<div class="task-title">
${task.title}

<span class="status-badge ${task.status}">
${task.status}
</span>

</div>

<p>${task.description}</p>

<p>Deadline : ${task.deadline ?? '-'}</p>

<p>${dueMessage}</p>

<a href="edit.html?id=${task.id}&title=${task.title}&description=${task.description}&deadline=${task.deadline ?? ''}">
<button class="edit">Edit</button>
</a>

<button class="delete" onclick="deleteTask(${task.id})">Delete</button>

</div>

`

})

}catch(error){

console.log("LOAD TASK ERROR:",error)

showToast("Gagal memuat task")

}

finally{

hideLoading()

}

}

function showLoading(){
document.getElementById("loading").style.display="flex"
}

function hideLoading(){
document.getElementById("loading").style.display="none"
}

async function addTask(){

const title = document.getElementById("title").value
const description = document.getElementById("description").value
const status = document.getElementById("status").value
const deadline = document.getElementById("deadline").value

showLoading()

try{

const response = await fetch("http://127.0.0.1:8000/api/tasks",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token,
"Accept":"application/json"
},

body:JSON.stringify({
title:title,
description:description,
status:status,
deadline:deadline
})

})

console.log(title, description, status, deadline)
await response.json()

showToast("Task berhasil ditambahkan")

document.getElementById("taskList")
document.getElementById("title").value=""
document.getElementById("description").value=""
document.getElementById("deadline").value=""

loadTasks()

}catch(error){

showToast("Gagal menambahkan task")

}

finally{

hideLoading()

}

}

async function deleteTask(id){

showLoading()

try{

await fetch(`http://127.0.0.1:8000/api/tasks/${id}`,{

method:"DELETE",

headers:{
"Authorization":"Bearer "+token,
"Accept":"application/json"
}

})

showToast("Task berhasil dihapus")

loadTasks()

}catch(error){

showToast("Gagal menghapus task")

}

finally{

hideLoading()

}

}

loadTasks()
showDate()

</script>

</body>
</html>

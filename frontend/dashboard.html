<!DOCTYPE html>
<html>
<head>
<title>StudyTask Dashboard</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
color:black;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{
background:#00c853;
color:white;
}

.delete{
background:#ff5252;
color:white;
}

.edit{
background:#2979ff;
color:white;
}

input{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

.form-task{
display:flex;
gap:10px;
margin-bottom:20px;
}

.form-task input,
.form-task select{
padding:8px;
border:1px solid #ccc;
border-radius:5px;
}

.add{
background:#3498db;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.add:hover{
background:#2980b9;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ccc;
border-top:5px solid #3498db;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#333;
color:white;
padding:15px 20px;
border-radius:5px;
display:none;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.profile-icon{
font-size:22px;
background:white;
color:black;
padding:10px 14px;
border-radius:50%;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.profile-icon:hover{
background:#f0f0f0;
}

</style>

</head>

<body>

<div class="header">

<h1>📚 StudyTask Manager</h1>

<a href="profile.html">
<div class="profile-icon">
👤
</div>
</a>

</div>

<!-- Form Tambah Task -->
<div class="form-task">

<input type="text" id="title" placeholder="Judul Task">

<input type="text" id="description" placeholder="Deskripsi Task">

<select id="status">
<option value="pending">Pending</option>
<option value="done">Done</option>
</select>

<button class="add" onclick="addTask()">Tambah Task</button>

</div>

<div id="toast"></div>

<hr>

<h2>Daftar Task</h2>

<div id="taskList"></div>

</div>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

</body>

<script>

const token=localStorage.getItem("token")

if(!token){
window.location="login.html"
}

async function loadTasks(){

showLoading()

try{

const response = await fetch("http://127.0.0.1:8000/api/tasks",{

headers:{
"Authorization":"Bearer "+token,
"Accept":"application/json"
}

})

const tasks = await response.json()

const list = document.getElementById("taskList")

list.innerHTML=""

tasks.forEach(task=>{

list.innerHTML+=`

<div class="card">

<h3>${task.title}</h3>

<p>${task.description}</p>

<p>Status : ${task.status}</p>

<a href="edit.html?id=${task.id}&title=${task.title}&description=${task.description}">
<button class="edit">Edit</button>
</a>

<button class="delete" onclick="deleteTask(${task.id})">Delete</button>
</div>

`

})

}catch(error){

console.log(error)
showToast("Gagal memuat task")

}

finally{

hideLoading()

}

}

function showLoading(){
document.getElementById("loading").style.display="flex"
}

function hideLoading(){
document.getElementById("loading").style.display="none"
}

async function addTask(){

const title = document.getElementById("title").value
const description = document.getElementById("description").value
const status = document.getElementById("status").value

showLoading()

try{

const response = await fetch("http://127.0.0.1:8000/api/tasks",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token,
"Accept":"application/json"
},

body:JSON.stringify({
title:title,
description:description,
status:status
})

})

await response.json()

showToast("Task berhasil ditambahkan")

document.getElementById("title").value=""
document.getElementById("description").value=""

loadTasks()

}catch(error){

showToast("Gagal menambahkan task")

}

finally{

hideLoading()

}

}

function showToast(message){

const toast = document.getElementById("toast")

toast.innerText = message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

async function deleteTask(id){

showLoading()

try{

await fetch(`http://127.0.0.1:8000/api/tasks/${id}`,{

method:"DELETE",

headers:{
"Authorization":"Bearer "+token,
"Accept":"application/json"
}

})

showToast("Task berhasil dihapus")

loadTasks()

}catch(error){

showToast("Gagal menghapus task")

}

finally{

hideLoading()

}

}

loadTasks()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Edit Task</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#4f46e5,#6366f1,#818cf8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:35px;
border-radius:15px;
width:380px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
text-align:center;
}

input,select{
width:92%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
}

button{
padding:11px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
width:95%;
margin-top:10px;
}

.update{
background:#6366f1;
color:white;
}

.update:hover{
background:#4f46e5;
}

.back{
background:#6b7280;
color:white;
}

.back:hover{
background:#4b5563;
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
color:white;
padding:15px 22px;
border-radius:8px;
display:none;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #6366f1;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>

</head>

<body>

<div class="card">

<h2>✏️ Edit Task</h2>

<input type="text" id="title" placeholder="Judul Task">

<input type="text" id="description" placeholder="Deskripsi Task">

<input type="date" id="deadline">

<select id="status">
<option value="pending">Pending</option>
<option value="done">Done</option>
</select>

<button class="update" onclick="updateTask()">Update Task</button>

<a href="dashboard-vercel.html">
<button class="back">Kembali</button>
</a>

</div>

<div id="toast"></div>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

<script>

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

const index = localStorage.getItem("editIndex")

if(index !== null){

const task = tasks[index]

document.getElementById("title").value = task.title
document.getElementById("description").value = task.description
document.getElementById("deadline").value = task.deadline
document.getElementById("status").value = task.status

}

function showLoading(){
document.getElementById("loading").style.display="flex"
}

function hideLoading(){
document.getElementById("loading").style.display="none"
}

function updateTask(){

const title = document.getElementById("title").value
const description = document.getElementById("description").value
const deadline = document.getElementById("deadline").value
const status = document.getElementById("status").value

if(!title){
showToast("Judul tidak boleh kosong")
return
}

showLoading()

setTimeout(()=>{

tasks[index] = {
title,
description,
deadline,
status
}

localStorage.setItem("tasks", JSON.stringify(tasks))

showToast("Task berhasil diupdate")

window.location="dashboard-vercel.html"

},800)

}

</script>

</body>
</html>

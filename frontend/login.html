<!DOCTYPE html>
<html>
<head>
<title>StudyTask Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4facfe;
border:none;
color:white;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

.small{
font-size:12px;
color:#777;
}

.link{
margin-top:10px;
display:block;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ccc;
border-top:5px solid #4facfe;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#333;
color:white;
padding:15px 20px;
border-radius:5px;
display:none;
}

</style>
</head>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

<div id="toast"></div>
<body>

<div class="container">

<h2>StudyTask Login</h2>

<input type="email" id="email" placeholder="Email (@gmail.com)">
<div class="small">Gunakan email Gmail</div>

<input type="password" id="password" placeholder="Password">

<button onclick="togglePassword()">Show / Hide Password</button>
<br><br>

<button onclick="login()">Login</button>

<a class="link" href="register.html">Belum punya akun? Register</a>

</div>

<script>
function showLoading(){
document.getElementById("loading").style.display="flex"
}

function hideLoading(){
document.getElementById("loading").style.display="none"
}

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}
function togglePassword(){
const p=document.getElementById("password")

if(p.type==="password"){
p.type="text"
}else{
p.type="password"
}
}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

if(!email.endsWith("@gmail.com")){
showToast("Gunakan email Gmail")
return
}

showLoading()

try{

const response=await fetch("http://127.0.0.1:8000/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

const data=await response.json()

if(data.token){

localStorage.setItem("token",data.token)

showToast("Login berhasil")

setTimeout(()=>{
window.location="dashboard.html"
},1000)

}else{

showToast("Login gagal")

}

}catch(error){

showToast("Server error")

}

finally{

hideLoading()

}

}

</script>

</body>
</html>

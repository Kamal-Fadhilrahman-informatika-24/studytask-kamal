<!DOCTYPE html>
<html>
<head>
<title>StudyTask Login</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#4f46e5,#6366f1,#818cf8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

/* CARD */

.container{
background:white;
padding:40px;
border-radius:16px;
width:340px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
text-align:center;
animation:fadeIn 0.4s ease;
}

h2{
margin-bottom:25px;
color:#111827;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
transition:0.2s;
}

input:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 0 2px rgba(99,102,241,0.2);
}

/* BUTTON */

button{
background:#6366f1;
border:none;
color:white;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#4f46e5;
transform:scale(1.02);
}

/* SMALL TEXT */

.small{
font-size:12px;
color:#6b7280;
margin-bottom:8px;
}

/* LINK */

.link{
margin-top:12px;
display:block;
color:#6366f1;
font-weight:500;
text-decoration:none;
}

.link:hover{
text-decoration:underline;
}

/* LOADING */

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:55px;
height:55px;
border:6px solid #ddd;
border-top:6px solid #6366f1;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* TOAST */

#toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
color:white;
padding:15px 22px;
border-radius:8px;
display:none;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

<div id="toast"></div>
<body>

<div class="container">

<h2>📚 StudyTask Login</h2>

<p style="text-align:left;font-size:13px;">Email</p>
<input type="email" id="email" placeholder="email@gmail.com">

<div class="small">Gunakan email Gmail</div>

<p style="text-align:left;font-size:13px;">Password</p>
<input type="password" id="password" placeholder="Password">

<button onclick="togglePassword()">Show / Hide Password</button>
<br><br>

<button onclick="login()">Login</button>

<a class="link" href="register.html">Belum punya akun? Register</a>

</div>

<script>
function showLoading(){
document.getElementById("loading").style.display="flex"
}

function hideLoading(){
document.getElementById("loading").style.display="none"
}

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}
function togglePassword(){
const p=document.getElementById("password")

if(p.type==="password"){
p.type="text"
}else{
p.type="password"
}
}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

if(!email.endsWith("@gmail.com")){
showToast("Gunakan email Gmail")
return
}

showLoading()

try{

const response=await fetch("http://127.0.0.1:8000/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

const data=await response.json()

if(data.token){

localStorage.setItem("token",data.token)

showToast("Login berhasil")

setTimeout(()=>{
window.location="dashboard.html"
},1000)

}else{

showToast("Login gagal")

}

}catch(error){

showToast("Server error")

}

finally{

hideLoading()

}

}

</script>

</body>
</html>

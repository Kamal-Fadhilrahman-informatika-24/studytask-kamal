<!DOCTYPE html>
<html>
<head>
<title>Register StudyTask</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4facfe;
border:none;
color:white;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

.small{
font-size:12px;
color:#777;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ccc;
border-top:5px solid #4facfe;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#333;
color:white;
padding:15px 20px;
border-radius:5px;
display:none;
}

</style>
</head>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

<div id="toast"></div>

<body>

<div class="container">

<h2>Buat Akun StudyTask</h2>

<input type="text" id="name" placeholder="Nama">

<input type="email" id="email" placeholder="Email (@gmail.com)">
<div class="small">Gunakan email Gmail</div>

<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>

<br><br>

<a href="login.html">Sudah punya akun? Login</a>

</div>

<script>

async function register(){

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const password=document.getElementById("password").value

if(!name || !email || !password){
showToast("Semua field harus diisi")
return
}

if(!email.endsWith("@gmail.com")){
showToast("Email harus menggunakan Gmail")
return
}

showLoading()

try{

const response=await fetch("http://127.0.0.1:8000/api/register",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
password:password
})

})

const data=await response.json()

if(response.ok){

showToast("Register berhasil!")

setTimeout(()=>{
window.location="login.html"
},1000)

}else{

showToast(data.message || "Register gagal")

}

}catch(error){

console.log(error)

showToast("Terjadi error saat register")

}

finally{

hideLoading()

}

}

function showLoading(){
document.getElementById("loading").style.display="flex"
}

function hideLoading(){
document.getElementById("loading").style.display="none"
}

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}
</script>

</body>
</html>

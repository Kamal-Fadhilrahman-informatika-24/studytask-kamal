<!DOCTYPE html>
<html>
<head>
<title>StudyTask Dashboard</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#4f46e5,#6366f1,#818cf8);
color:white;
padding:30px;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.profile-icon{
font-size:22px;
background:white;
color:black;
padding:10px 14px;
border-radius:50%;
cursor:pointer;
box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

.form-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
margin-bottom:25px;
color:black;
}

.form-task{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.form-task input,
.form-task select{
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

.add{
background:#6366f1;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
}

.stat-card{
flex:1;
background:white;
color:black;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card{
background:white;
color:black;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.status-badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.pending{
background:#fef3c7;
}

.done{
background:#d1fae5;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:8px;
}

.edit{
background:#2979ff;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
color:white;
padding:15px 20px;
border-radius:5px;
display:none;
}

</style>
</head>

<body>

<div class="header">

<h1>📚 StudyTask Manager</h1>

<a href="profile-vercel.html">
<div class="profile-icon">👤</div>
</a>

</div>

<div class="form-card">

<div class="form-task">

<input type="text" id="title" placeholder="Judul Task">

<input type="text" id="description" placeholder="Deskripsi Task">

<select id="status">
<option value="pending">Pending</option>
<option value="done">Done</option>
</select>

<input type="date" id="deadline">

<button class="add" onclick="addTask()">Tambah Task</button>

</div>

</div>

<div class="stats">

<div class="stat-card">
<p>Total Task</p>
<h3 id="totalTask">0</h3>
</div>

<div class="stat-card">
<p>Pending</p>
<h3 id="pendingTask">0</h3>
</div>

<div class="stat-card">
<p>Done</p>
<h3 id="doneTask">0</h3>
</div>

</div>

<h2>Daftar Task</h2>

<div id="taskList"></div>

<div id="toast"></div>

<script>

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

let tasks=JSON.parse(localStorage.getItem("tasks")) || []

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function loadTasks(){

const list=document.getElementById("taskList")

list.innerHTML=""

document.getElementById("totalTask").innerText=tasks.length

const pending=tasks.filter(t=>t.status==="pending").length
const done=tasks.filter(t=>t.status==="done").length

document.getElementById("pendingTask").innerText=pending
document.getElementById("doneTask").innerText=done

tasks.forEach((task,index)=>{

list.innerHTML+=`

<div class="card">

<h3>${task.title}
<span class="status-badge ${task.status}">
${task.status}
</span>
</h3>

<p>${task.description}</p>

<p>Deadline : ${task.deadline || "-"}</p>

<button class="edit" onclick="editTask(${index})">Edit</button>

<button class="delete" onclick="deleteTask(${index})">Delete</button>

</div>

`

})

}

function addTask(){

const title=document.getElementById("title").value
const description=document.getElementById("description").value
const status=document.getElementById("status").value
const deadline=document.getElementById("deadline").value

if(!title){
showToast("Judul task harus diisi")
return
}

tasks.push({
title,
description,
status,
deadline
})

saveTasks()

document.getElementById("title").value=""
document.getElementById("description").value=""
document.getElementById("deadline").value=""

showToast("Task berhasil ditambahkan")

loadTasks()

}

function deleteTask(index){

tasks.splice(index,1)

saveTasks()

showToast("Task dihapus")

loadTasks()

}

function editTask(index){

const task=tasks[index]

localStorage.setItem("editIndex",index)

window.location="edit-vercel.html"

}

loadTasks()

</script>

</body>
</html>

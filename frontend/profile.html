<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:8px;
width:100%;
font-weight:bold;
}

.logout{
background:#2979ff;
color:white;
}

.delete{
background:#ff5252;
color:white;
}

.back{
background:#999;
color:white;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ccc;
border-top:5px solid #4facfe;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#toast{
position:fixed;
top:20px;
right:20px;
background:#333;
color:white;
padding:15px 20px;
border-radius:5px;
display:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Profil Saya</h2>

<input type="text" id="name" readonly>

<input type="email" id="email" readonly>

<input type="password" id="password" value="********" readonly>

<button class="logout" onclick="logout()">Logout</button>

<button class="delete" onclick="deleteAccount()">Hapus Akun</button>

<button class="back" onclick="goDashboard()">Kembali</button>

</div>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

<div id="toast"></div>

<script>

const token=localStorage.getItem("token")

if(!token){
window.location="login.html"
}

function showLoading(){
document.getElementById("loading").style.display="flex"
}

function hideLoading(){
document.getElementById("loading").style.display="none"
}

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

async function loadProfile(){

showLoading()

try{

const response=await fetch("http://127.0.0.1:8000/api/me",{

headers:{
"Authorization":"Bearer "+token,
"Accept":"application/json"
}

})

const user=await response.json()

document.getElementById("name").value=user.name
document.getElementById("email").value=user.email

}catch(error){

showToast("Gagal memuat profil")

}

finally{

hideLoading()

}

}

function logout(){

if(!confirm("Yakin ingin logout?")){
return
}

showLoading()

setTimeout(()=>{

localStorage.removeItem("token")

showToast("Logout berhasil")

window.location="login.html"

},800)

}

async function deleteAccount(){

if(!confirm("Yakin ingin menghapus akun?")){
return
}

showLoading()

try{

await fetch("http://127.0.0.1:8000/api/delete-account",{

method:"DELETE",

headers:{
"Authorization":"Bearer "+token,
"Accept":"application/json"
}

})

localStorage.removeItem("token")

showToast("Akun berhasil dihapus")

setTimeout(()=>{
window.location="login.html"
},800)

}catch(error){

showToast("Gagal menghapus akun")

}

finally{

hideLoading()

}

}

function goDashboard(){

showLoading()

setTimeout(()=>{
window.location="dashboard.html"
},600)

}

loadProfile()

</script>

</body>
</html>
